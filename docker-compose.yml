# Contrat de déploiement agnostique VibeLab.
#
# APP_NAME et DOMAIN sont fournis par l'orchestrateur (spawn) à l'exécution ;
# le backend mail aussi (MAIL_HOST/MAIL_PORT) : `spawn --mail` → Mailpit
# (catcher de dev), `spawn --mail real` → smtp-relay (envoi réel signé DKIM
# @miweb.run). Aucun domaine, réseau interne ni hébergeur n'est codé en dur.
# Les valeurs par défaut permettent un `docker compose up` autonome en local.
#
# Le service principal s'appelle `web` (contrat vibelab-starter : port interne
# 3000, pas de `ports:`, exposition uniquement via Traefik sur le réseau proxy).
services:
  web:
    build: .
    image: latelier-cadrage-site:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/app.db
      - LOG_LEVEL=info
      # Bootstrap admin : ces emails reçoivent un grant `admin global` au boot
      # (idempotent). Indispensable pour la première instance — sinon /admin
      # est inaccessible (self-signup donne `viewer`).
      - BOOTSTRAP_ADMIN_EMAILS=${BOOTSTRAP_ADMIN_EMAILS:-}
      # Auth : 'local' (magic-link interne, défaut) ou 'proxy'. En 'proxy'
      # (ADR-062), l'app fait confiance à l'en-tête PROXY_AUTH_HEADER posé par
      # le gate du lab en amont (`spawn up <nom> --auth link`) et désactive son
      # magic-link interne. Posé via le `.env` du VPS (AUTH_MODE=proxy).
      - AUTH_MODE=${AUTH_MODE:-local}
      - PROXY_AUTH_HEADER=${PROXY_AUTH_HEADER:-x-gate-email}
      # Mail : SMTP_HOST/PORT sont injectés par l'orchestrateur via
      # MAIL_HOST/MAIL_PORT. `--mail` → mailer:1025 (Mailpit) ; `--mail real`
      # → smtp-relay:25 (Postfix+OpenDKIM, From signé @miweb.run). En local
      # sans spawn, défaut Mailpit.
      - MAILER_DRIVER=smtp
      - SMTP_HOST=${MAIL_HOST:-mailer}
      - SMTP_PORT=${MAIL_PORT:-1025}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      # L'expéditeur DOIT être @miweb.run pour que le smtp-relay le signe en
      # DKIM (ALLOWED_SENDER_DOMAINS=miweb.run).
      - SMTP_FROM=${SMTP_FROM:-latelier-noreply@miweb.run}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-L'atelier}
      - SMTP_REPLY_TO=${SMTP_REPLY_TO:-}
      # POC cadrage IA via Albert (DINUM). Désactivé par défaut. Pour activer
      # en prod : CADRAGE_ENABLED=1 + ALBERT_API_URL + ALBERT_API_KEY dans
      # le `.env` du VPS.
      - CADRAGE_ENABLED=${CADRAGE_ENABLED:-0}
      - ALBERT_API_URL=${ALBERT_API_URL:-}
      - ALBERT_API_KEY=${ALBERT_API_KEY:-}
      - ALBERT_MODEL=${ALBERT_MODEL:-gpt-oss-120b}
      - ALBERT_TEMPERATURE=${ALBERT_TEMPERATURE:-0.3}
    volumes:
      - app-data:/data
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.${APP_NAME:-latelier}.rule=Host(`${DOMAIN:-latelier.localhost}`)
      - traefik.http.routers.${APP_NAME:-latelier}.entrypoints=websecure
      - traefik.http.routers.${APP_NAME:-latelier}.tls.certresolver=letsencrypt
      - traefik.http.services.${APP_NAME:-latelier}.loadbalancer.server.port=3000

  # Sidecar backup : `sqlite3 .backup` quotidien à 03:00, rétention
  # configurable via BACKUP_RETENTION_DAYS (défaut 30). Lit la DB en
  # read-only, écrit dans le volume backup-data — pas de risque pour le
  # WAL de l'app. Cf. docs/ops/sqlite.md.
  backup:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      - web
    environment:
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - app-data:/data:ro
      - backup-data:/backups
      - ./ops/backup.sh:/usr/local/bin/backup.sh:ro
    command: >
      sh -c "apk add --no-cache sqlite tini && /sbin/tini -- /bin/sh -c '
        echo \"0 3 * * * /usr/local/bin/backup.sh >> /var/log/backup.log 2>&1\" > /etc/crontabs/root &&
        crond -f -L /var/log/backup.log
      '"

volumes:
  app-data:
  backup-data:

networks:
  # Réseau d'entrée HTTP fourni par la plateforme hôte (externe).
  proxy:
    external: true
